<!-- Giscus 评论系统 -->
<!--
  配置步骤：
  1. 在 GitHub 仓库 Settings → General → Features 中勾选 Discussions
  2. 访问 https://giscus.app/zh-CN 填入 sikinzen/sikinzen.github.io
  3. 选择 Discussions 分类（推荐 General），复制 data-category-id
  4. 将下方 data-category-id 的值替换为实际 ID
  5. 可选：安装 giscus GitHub App https://github.com/apps/giscus
-->

<div class="giscus">
  <script src="https://giscus.app/client.js"
          data-repo="sikinzen/sikinzen.github.io"
          data-repo-id="R_kgDOSxL0IQ"
          data-category="General"
          data-category-id="REPLACE_ME"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="preferred_color_scheme"
          data-lang="zh-CN"
          data-loading="lazy"
          crossorigin="anonymous"
          async>
  </script>
</div>

<noscript>
  <p class="giscus-fallback">
    请启用 JavaScript 以查看 <a href="https://giscus.app/zh-CN">Giscus</a> 评论。
  </p>
</noscript>
